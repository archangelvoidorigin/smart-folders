name: Validate Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate knowledge-base example
        run: python scripts/validate.py examples/knowledge-base/

      - name: Validate web-app example
        run: python scripts/validate.py examples/web-app/

      - name: Validate api-service example
        run: python scripts/validate.py examples/api-service/

      - name: Validate all examples recursively
        run: python scripts/validate.py examples/ --recursive
